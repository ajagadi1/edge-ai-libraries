services:
  audio-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audio-analyzer
    ports:
      - "8010:8010"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      AUDIO_ANALYZER_CONFIG_OVERRIDE_PATHS: /app/audio_analyzer/config.container.yaml
    volumes:
      - ./config.container.yaml:/app/audio_analyzer/config.container.yaml:ro
      - ./models:/app/audio_analyzer/models
      - ./chunks:/app/audio_analyzer/chunks
      - ./storage:/app/audio_analyzer/storage
      - ./.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped
    # Uncomment the next lines if you also need microphone capture from the host.
    # devices:
    #   - /dev/snd:/dev/snd